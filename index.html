<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#12121a">
  <title>Idea Pipeline</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icon-180.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>💡 Idea Pipeline</h1>
    <button id="settingsBtn" class="icon-btn" title="Settings">⚙️</button>
  </header>

  <main>
    <section id="captureView">
      <button type="button" id="voiceBtn" class="voice-btn">🎤 Dictate the idea</button>
      <div id="voicePreview" class="voice-preview hidden"></div>
      <form id="ideaForm">
        <label>Title
          <input id="title" type="text" required autocomplete="off" placeholder="Poker range visualiser">
        </label>
        <label>One-line pitch
          <input id="pitch" type="text" autocomplete="off" placeholder="What is it, in one sentence?">
        </label>
        <label>Notes
          <textarea id="notes" rows="4" placeholder="Context, features, why now…"></textarea>
        </label>
        <label>Starting prompt for Claude
          <textarea id="startingPrompt" rows="5" placeholder="The prompt that kicks off the build when you're back at your desk…"></textarea>
        </label>
        <label>Tags
          <input id="tags" type="text" autocomplete="off" placeholder="poker, web, tooling (comma separated)">
        </label>
        <button type="submit" id="saveBtn">Send to desktop</button>
      </form>
      <div id="status" role="status"></div>
      <div id="queueBanner" class="banner hidden">
        <span id="queueCount"></span>
        <button id="flushBtn">Retry now</button>
      </div>
    </section>

    <section id="listView">
      <h2>In the pipeline <button id="refreshBtn" class="icon-btn" title="Refresh">↻</button></h2>
      <ul id="ideaList"><li class="muted">Configure GitHub in settings, then refresh.</li></ul>
    </section>
  </main>

  <dialog id="settingsDialog">
    <form method="dialog" id="settingsForm">
      <h2>GitHub settings</h2>
      <label>Repo owner (username)
        <input id="cfgOwner" type="text" autocomplete="off" autocapitalize="none">
      </label>
      <label>Data repo name
        <input id="cfgRepo" type="text" autocomplete="off" autocapitalize="none" placeholder="idea-pipeline">
      </label>
      <label>Fine-grained personal access token
        <input id="cfgToken" type="password" autocomplete="off"
               placeholder="github_pat_… (Contents: read/write on the data repo)">
      </label>
      <p class="muted small">The token is stored only in this browser (localStorage) and sent only to api.github.com.</p>
      <div class="row">
        <button value="cancel" formnovalidate>Cancel</button>
        <button value="save" id="saveSettingsBtn">Save</button>
      </div>
    </form>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
